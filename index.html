<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen YouTube Video</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

.video-container {
    position: fixed;
    inset: 0;
}

.video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>

</head>
<body>

<div class="video-container">
    <iframe
        src="https://www.youtube.com/embed/58UAusI1z2o?si=VMknqDfRiypPVAdW&autoplay=1&rel=0&modestbranding=1&playsinline=1"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
